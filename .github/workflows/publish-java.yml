name: Publish Java Layers

on:
  push:
    tags:
      - v**_java

jobs:
  # ── Job 1: Build + publish staging (java21 only) ──────────────────────────
  stage-java:
    runs-on: ubuntu-latest
    outputs:
      tag-match: ${{ steps.java-check-tag.outputs.match }}
      arn_x86:   ${{ steps.staging.outputs.arn_x86 }}
      arn_arm64: ${{ steps.staging.outputs.arn_arm64 }}
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # pin@v4
      - name: Use Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Check Tag
        id: java-check-tag
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+(\.[0-9]+)*_java$ ]]; then
              echo "match=true" >> $GITHUB_OUTPUT
          fi
      - name: Build layer artifacts (java21)
        if: steps.java-check-tag.outputs.match == 'true'
        run: make extract-java21-artifacts
      - name: Publish staging layers (java21)
        if: steps.java-check-tag.outputs.match == 'true'
        id: staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
        run: |
          cd java
          DIST_DIR=../dist/java21 ./publish-layers.sh publish-staging-java21

  # ── Job 2: Validate (calls reusable workflow) ─────────────────────────────
  validate-java:
    needs: stage-java
    if: needs.stage-java.outputs.tag-match == 'true'
    uses: ./.github/workflows/validate-layer.yml
    with:
      runtime:   java21
      arn_x86:   ${{ needs.stage-java.outputs.arn_x86 }}
      arn_arm64: ${{ needs.stage-java.outputs.arn_arm64 }}
    secrets: inherit

  # ── Job 3: Cleanup staging (always) ──────────────────────────────────────
  cleanup-java:
    needs: [stage-java, validate-java]
    if: always() && needs.stage-java.outputs.arn_x86 != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup staging layers
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
          ARN_X86:   ${{ needs.stage-java.outputs.arn_x86 }}
          ARN_ARM64: ${{ needs.stage-java.outputs.arn_arm64 }}
        run: |
          cd java
          ./publish-layers.sh cleanup-staging-java21

  # ── Job 4: Release all Java versions — gated on validate passing ──────────
  publish-java:
    needs: [stage-java, validate-java]
    if: needs.stage-java.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [java8al2, java11, java17, java21]
    outputs:
      failure_summary: ${{ steps.publish.outputs.failure_summary }}
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # pin@v4
      - name: Set up Java version
        run: |
          declare -A map_java_version
          map_java_version=(
            ["java8al2"]="8"
            ["java11"]="11"
            ["java17"]="17"
            ["java21"]="21"
          )
          java_numeric_version=${map_java_version[${{ matrix.java-version }}]}
          echo "JAVA_NUMERIC_VERSION=$java_numeric_version" >> $GITHUB_ENV
      - name: Use Java ${{ env.JAVA_NUMERIC_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: ${{ env.JAVA_NUMERIC_VERSION }}
      - name: Build layer artifacts (java21 only)
        if: matrix.java-version == 'java21'
        run: make extract-java21-artifacts
      - name: Publish ${{ matrix.java-version }} layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [[ "${{ matrix.java-version }}" == "java21" ]]; then
            docker run \
              -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY \
              -e GITHUB_OUTPUT -e GITHUB_STEP_SUMMARY \
              -v "$GITHUB_OUTPUT:$GITHUB_OUTPUT" \
              -v "$GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY" \
              newrelic-lambda-layers-java21
          else
            make publish-${{ matrix.java-version }}-ci
          fi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Publish ECR image for ${{ matrix.java-version }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cd java
          ./publish-layers.sh build-publish-${{ matrix.java-version }}-ecr-image

  # ── Job 5: Slack release summary — only after validate passed ─────────────
  notify-slack:
    needs: [stage-java, validate-java, publish-java]
    if: always() && needs.validate-java.result == 'success' && needs.stage-java.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_VALIDATION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.publish-java.result == 'success' && ':white_check_mark:' || ':x:' }} *java* layers (8al2 / 11 / 17 / 21) release ${{ needs.publish-java.result == 'success' && 'succeeded' || 'FAILED' }}${{ needs.publish-java.outputs.failure_summary != '' && format(' — {0}', needs.publish-java.outputs.failure_summary) || '' }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"
            }
