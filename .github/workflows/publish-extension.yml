name: Publish Extension Layer

on:
  push:
    tags:
      - v**_extension
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated regions to (re)publish. Leave empty to publish all regions.'
        required: false
        default: ''

jobs:
  # ── Job 1: Publish staging (extension) ───────────────────────────────────
  stage-extension:
    runs-on: ubuntu-latest
    outputs:
      tag-match: ${{ steps.extension-check-tag.outputs.match }}
      arn_x86:   ${{ steps.staging.outputs.arn_x86 }}
      arn_arm64: ${{ steps.staging.outputs.arn_arm64 }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Tag
        id: extension-check-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ github.event.ref }}" =~ ^refs/tags/v[0-9]+(\.[0-9]+)*_extension$ ]]; then
              echo "match=true" >> $GITHUB_OUTPUT
          fi
      - name: Install publish dependencies
        if: steps.extension-check-tag.outputs.match == 'true'
        run: pip install -U awscli
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Publish staging layers
        if: steps.extension-check-tag.outputs.match == 'true'
        id: staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
        run: |
          cd extension
          ./publish-layer.sh publish-staging

  # ── Job 2a: Validate go/al2 (calls reusable workflow) ────────────────────
  validate-al2:
    needs: stage-extension
    if: needs.stage-extension.outputs.tag-match == 'true'
    uses: ./.github/workflows/validate-layer.yml
    with:
      runtime:   go
      label:     go/al2
      arn_x86:   ${{ needs.stage-extension.outputs.arn_x86 }}
      arn_arm64: ${{ needs.stage-extension.outputs.arn_arm64 }}
      os:        al2
    secrets: inherit

  # ── Job 2b: Validate go/al2023 (calls reusable workflow, runs in parallel) ─
  validate-al2023:
    needs: stage-extension
    if: needs.stage-extension.outputs.tag-match == 'true'
    uses: ./.github/workflows/validate-layer.yml
    with:
      runtime:   go
      label:     go/al2023
      arn_x86:   ${{ needs.stage-extension.outputs.arn_x86 }}
      arn_arm64: ${{ needs.stage-extension.outputs.arn_arm64 }}
      os:        al2023
    secrets: inherit

  # ── Job 3: Cleanup staging (always, after both validates) ─────────────────
  cleanup-extension:
    needs: [stage-extension, validate-al2, validate-al2023]
    if: always() && needs.stage-extension.outputs.arn_x86 != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup staging layers
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
          ARN_X86:   ${{ needs.stage-extension.outputs.arn_x86 }}
          ARN_ARM64: ${{ needs.stage-extension.outputs.arn_arm64 }}
        run: |
          cd extension
          ./publish-layer.sh cleanup-staging

  # ── Job 4: Release extension — gated on BOTH validates passing ────────────
  publish-extension:
    needs: [stage-extension, validate-al2, validate-al2023]
    if: needs.stage-extension.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    outputs:
      failure_summary: ${{ steps.publish.outputs.failure_summary }}
    steps:
      - uses: actions/checkout@v4
      - name: Install publish dependencies
        run: pip install -U awscli
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Load failed regions for re-run
        id: region-retry-load
        uses: ./.github/actions/region-retry
        with:
          mode: load
          job_key: extension
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}
      - name: Publish extension layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PUBLISH_REGIONS: ${{ steps.region-retry-load.outputs.publish_regions || inputs.regions }}
        run: |
          cd extension
          ./publish-layer.sh
      - name: Save failed regions for re-run
        if: always()
        uses: ./.github/actions/region-retry
        with:
          mode: save
          job_key: extension
          failure_summary: ${{ steps.publish.outputs.failure_summary }}
          run_id: ${{ github.run_id }}
          run_attempt: ${{ github.run_attempt }}

  # ── Job 5: Slack release summary — only after both validates passed ────────
  notify-slack:
    needs: [stage-extension, validate-al2, validate-al2023, publish-extension]
    if: always() && needs.validate-al2.result == 'success' && needs.validate-al2023.result == 'success' && needs.stage-extension.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/notify-slack-layer
        with:
          language_name: Extension (Go/AL2+AL2023)
          versions_json: '[{"key":"extension","label":"Extension (go/al2+al2023)","job":"publish-extension","fallback":"${{ needs.publish-extension.result }}"}]'
          failure_summaries: ${{ needs.publish-extension.outputs.failure_summary }}
          slack_webhook: ${{ secrets.SLACK_VALIDATION_WEBHOOK }}
          gh_token: ${{ github.token }}
          repo: ${{ github.repository }}
          run_id: ${{ github.run_id }}
          ref_name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          server_url: ${{ github.server_url }}
