name: Publish Ruby Layers

on:
  push:
    tags:
      - v**_ruby

jobs:
  # ── Job 1: Publish staging (ruby3.4 only) ────────────────────────────────
  stage-ruby:
    runs-on: ubuntu-latest
    outputs:
      tag-match: ${{ steps.ruby-check-tag.outputs.match }}
      arn_x86:   ${{ steps.staging.outputs.arn_x86 }}
      arn_arm64: ${{ steps.staging.outputs.arn_arm64 }}
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Ruby 3.4
        uses: ruby/setup-ruby@v1.226.0
        with:
          ruby-version: 3.4
      - name: Check Tag
        id: ruby-check-tag
        run: |
          if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+(\.[0-9]+)*_ruby$ ]]; then
              echo "match=true" >> $GITHUB_OUTPUT
          fi
      - name: Clean the workspace
        run: ./bin/clean
        working-directory: ruby
      - name: Install Ruby Dependencies
        run: bundle
        working-directory: ruby
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Publish staging layers (ruby3.4)
        if: steps.ruby-check-tag.outputs.match == 'true'
        id: staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
        run: |
          cd ruby
          ./publish-layers.sh publish-staging-ruby3.4

  # ── Job 2: Validate (calls reusable workflow) ─────────────────────────────
  validate-ruby:
    needs: stage-ruby
    if: needs.stage-ruby.outputs.tag-match == 'true'
    uses: ./.github/workflows/validate-layer.yml
    with:
      runtime:   ruby34
      arn_x86:   ${{ needs.stage-ruby.outputs.arn_x86 }}
      arn_arm64: ${{ needs.stage-ruby.outputs.arn_arm64 }}
    secrets: inherit

  # ── Job 3: Cleanup staging (always) ──────────────────────────────────────
  cleanup-ruby:
    needs: [stage-ruby, validate-ruby]
    if: always() && needs.stage-ruby.outputs.arn_x86 != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup staging layers
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          STAGING_REGION: us-east-1
          ARN_X86:   ${{ needs.stage-ruby.outputs.arn_x86 }}
          ARN_ARM64: ${{ needs.stage-ruby.outputs.arn_arm64 }}
        run: |
          cd ruby
          ./publish-layers.sh cleanup-staging-ruby3.4

  # ── Job 4: Release all Ruby versions — gated on validate passing ──────────
  publish-ruby:
    needs: [stage-ruby, validate-ruby]
    if: needs.stage-ruby.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: [3.2, 3.3, 3.4]
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1.226.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - name: Clean the workspace
        run: ./bin/clean
        working-directory: ruby
      - name: Install Ruby Dependencies
        run: bundle
        working-directory: ruby
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Build and Publish layer
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: ./publish-layers.sh ruby${{ matrix.ruby-version }}
        working-directory: ruby

  # ── Job 5: Slack release summary — only after validate passed ─────────────
  notify-slack:
    needs: [stage-ruby, validate-ruby, publish-ruby]
    if: always() && needs.validate-ruby.result == 'success' && needs.stage-ruby.outputs.tag-match == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_VALIDATION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.publish-ruby.result == 'success' && ':white_check_mark:' || ':x:' }} *ruby* layers (3.2 / 3.3 / 3.4) release ${{ needs.publish-ruby.result == 'success' && 'succeeded' || 'FAILED' }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_id }}>"
            }
