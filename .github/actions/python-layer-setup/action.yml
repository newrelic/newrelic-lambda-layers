name: Python Layer Setup
description: Common setup steps for Python Lambda layer publishing

outputs:
  tag-match:
    description: Whether the git tag matches the expected pattern
    value: ${{ steps.check-tag.outputs.match }}

runs:
  using: composite
  steps:
    - name: Check Tag
      id: check-tag
      shell: bash
      run: |
        if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+(\.[0-9]+)*_python$ ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
        fi
    - name: Install python dependencies
      if: steps.check-tag.outputs.match == 'true'
      shell: bash
      run: pip install -U awscli
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64, amd64
